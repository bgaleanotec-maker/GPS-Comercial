{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="mx-auto w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6">
            <svg class="w-12 h-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-100 mb-2">Sin conexion</h1>
        <p class="text-slate-400 mb-6">No hay conexion a internet. Algunas funciones estan disponibles offline.</p>
        <div class="space-y-3">
            <button onclick="location.reload()" class="w-full px-6 py-3 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-500 transition-colors">
                Reintentar
            </button>
            <p class="text-xs text-slate-500">Las visitas registradas offline se sincronizaran automaticamente</p>
        </div>
    </div>
</div>
{% endblock %}
